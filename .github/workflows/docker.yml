name: Docker

# Push multi-arch images to GHCR on tags (`v*`) and on every push to main as
# `:edge`. Tagged builds also produce `:latest` and the bare version tag.
on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

# Minimum permissions for GHCR push. GITHUB_TOKEN works for the repo's own
# GHCR namespace — no PAT needed.
permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/sql-guardrail

jobs:
  build:
    name: Build & push image
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=edge,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Speed: cache layers across runs via GHA's built-in cache.
          cache-from: type=gha
          cache-to: type=gha,mode=max
