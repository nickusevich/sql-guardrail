name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pre-commit:
    name: pre-commit (lint + hygiene)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dev deps
        run: uv sync --extra dev --python 3.12

      # Runs the pre-commit-stage hooks (ruff + file hygiene) over the whole
      # tree. mypy is a pre-push-stage hook and is covered by the test job's
      # matrix below, so it is intentionally not re-run here.
      - name: Run pre-commit
        run: uv run pre-commit run --all-files --show-diff-on-failure

  test:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install package + dev + server deps
        run: uv sync --extra dev --extra server --python ${{ matrix.python-version }}

      - name: Type-check (mypy --strict)
        run: uv run mypy src

      - name: Test (pytest + coverage)
        run: uv run pytest --cov=sqlguard --cov-report=term --cov-report=xml

      - name: Upload coverage XML
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
